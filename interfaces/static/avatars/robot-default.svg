<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Antenna -->
  <line x1="24" y1="9" x2="24" y2="5" stroke="#7b6ef6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="4" r="2" fill="#a78bfa"/>
  <!-- Head -->
  <rect x="14" y="9" width="20" height="15" rx="4" fill="#7b6ef6"/>
  <!-- Eyes -->
  <circle cx="20" cy="16" r="2.5" fill="#fff"/>
  <circle cx="28" cy="16" r="2.5" fill="#fff"/>
  <circle cx="20.8" cy="16.8" r="1.2" fill="#1a1630"/>
  <circle cx="28.8" cy="16.8" r="1.2" fill="#1a1630"/>
  <!-- Mouth -->
  <rect x="19" y="20" width="10" height="2" rx="1" fill="#c4b5fd" opacity="0.7"/>
  <!-- Neck -->
  <rect x="21" y="24" width="6" height="3" rx="1" fill="#5b4fd4"/>
  <!-- Body -->
  <rect x="12" y="27" width="24" height="16" rx="4" fill="#5b4fd4"/>
  <!-- Chest panel -->
  <rect x="17" y="30" width="14" height="9" rx="2" fill="#7b6ef6" opacity="0.5"/>
  <circle cx="21" cy="34" r="1.5" fill="#a78bfa"/>
  <circle cx="27" cy="34" r="1.5" fill="#a78bfa"/>
  <!-- Arms -->
  <rect x="5" y="27" width="7" height="4" rx="2" fill="#5b4fd4"/>
  <rect x="36" y="27" width="7" height="4" rx="2" fill="#5b4fd4"/>
  <!-- Hands -->
  <circle cx="5" cy="31" r="2.5" fill="#7b6ef6"/>
  <circle cx="43" cy="31" r="2.5" fill="#7b6ef6"/>
  <!-- Legs -->
  <rect x="16" y="43" width="7" height="4" rx="2" fill="#5b4fd4"/>
  <rect x="25" y="43" width="7" height="4" rx="2" fill="#5b4fd4"/>
</svg>
