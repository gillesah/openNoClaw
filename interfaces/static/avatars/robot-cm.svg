<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Speech bubble antenna -->
  <line x1="24" y1="9" x2="24" y2="5" stroke="#e6a94a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="4" r="2" fill="#e6a94a"/>
  <!-- Head -->
  <rect x="14" y="9" width="20" height="15" rx="4" fill="#6e4a1a"/>
  <!-- Eyes — happy -->
  <circle cx="20" cy="15" r="2.5" fill="#fff" opacity="0.9"/>
  <circle cx="28" cy="15" r="2.5" fill="#fff" opacity="0.9"/>
  <circle cx="20" cy="15" r="1.2" fill="#1a1630"/>
  <circle cx="28" cy="15" r="1.2" fill="#1a1630"/>
  <!-- Smile -->
  <path d="M19 20 Q24 24 29 20" stroke="#e6a94a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Neck -->
  <rect x="21" y="24" width="6" height="3" rx="1" fill="#5c3a1a"/>
  <!-- Body -->
  <rect x="12" y="27" width="24" height="16" rx="4" fill="#5c3a1a"/>
  <!-- Chat bubble icon on chest -->
  <rect x="16" y="29" width="16" height="10" rx="3" fill="#e6a94a" opacity="0.3"/>
  <rect x="18" y="31" width="5" height="1.5" rx="0.75" fill="#e6a94a"/>
  <rect x="18" y="34" width="10" height="1.5" rx="0.75" fill="#e6a94a"/>
  <path d="M20 39 L18 41" stroke="#e6a94a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Arms -->
  <rect x="5" y="27" width="7" height="4" rx="2" fill="#5c3a1a"/>
  <rect x="36" y="27" width="7" height="4" rx="2" fill="#5c3a1a"/>
  <circle cx="5" cy="31" r="2.5" fill="#6e4a1a"/>
  <circle cx="43" cy="31" r="2.5" fill="#6e4a1a"/>
  <!-- Legs -->
  <rect x="16" y="43" width="7" height="4" rx="2" fill="#5c3a1a"/>
  <rect x="25" y="43" width="7" height="4" rx="2" fill="#5c3a1a"/>
</svg>
