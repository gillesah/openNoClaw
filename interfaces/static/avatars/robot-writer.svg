<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Antenna with pencil tip -->
  <line x1="24" y1="9" x2="24" y2="5" stroke="#f05a8a" stroke-width="2" stroke-linecap="round"/>
  <polygon points="22,2 26,2 24,5" fill="#f05a8a"/>
  <!-- Head -->
  <rect x="14" y="9" width="20" height="15" rx="4" fill="#5c1a3a"/>
  <!-- Eyes — creative -->
  <circle cx="20" cy="15" r="2.5" fill="#fff" opacity="0.9"/>
  <circle cx="28" cy="15" r="2.5" fill="#fff" opacity="0.9"/>
  <circle cx="20.5" cy="14.5" r="1.2" fill="#1a1630"/>
  <circle cx="28.5" cy="14.5" r="1.2" fill="#1a1630"/>
  <!-- Star sparkle -->
  <line x1="31" y1="11" x2="31" y2="13" stroke="#f05a8a" stroke-width="1"/>
  <line x1="30" y1="12" x2="32" y2="12" stroke="#f05a8a" stroke-width="1"/>
  <!-- Smile -->
  <path d="M19 20 Q24 23 29 20" stroke="#f05a8a" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Neck -->
  <rect x="21" y="24" width="6" height="3" rx="1" fill="#4a1230"/>
  <!-- Body -->
  <rect x="12" y="27" width="24" height="16" rx="4" fill="#4a1230"/>
  <!-- Pencil on chest -->
  <rect x="21" y="29" width="2" height="11" rx="0.5" fill="#f0c44a" transform="rotate(-20 22 34.5)"/>
  <polygon points="19.5,39 22.5,39 21,42" fill="#f05a8a" transform="rotate(-20 21 40)"/>
  <!-- Lines (writing) -->
  <line x1="28" y1="31" x2="34" y2="31" stroke="#f05a8a" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <line x1="28" y1="34" x2="32" y2="34" stroke="#f05a8a" stroke-width="1.2" stroke-linecap="round" opacity="0.4"/>
  <line x1="28" y1="37" x2="34" y2="37" stroke="#f05a8a" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>
  <!-- Arms -->
  <rect x="5" y="27" width="7" height="4" rx="2" fill="#4a1230"/>
  <rect x="36" y="27" width="7" height="4" rx="2" fill="#4a1230"/>
  <circle cx="5" cy="31" r="2.5" fill="#5c1a3a"/>
  <circle cx="43" cy="31" r="2.5" fill="#5c1a3a"/>
  <!-- Legs -->
  <rect x="16" y="43" width="7" height="4" rx="2" fill="#4a1230"/>
  <rect x="25" y="43" width="7" height="4" rx="2" fill="#4a1230"/>
</svg>
