<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Antenna -->
  <line x1="24" y1="9" x2="24" y2="5" stroke="#5b9ef6" stroke-width="2" stroke-linecap="round"/>
  <circle cx="24" cy="4" r="2" fill="#5b9ef6"/>
  <!-- Head -->
  <rect x="14" y="9" width="20" height="15" rx="4" fill="#1a3a5c"/>
  <!-- Eyes — analytical -->
  <circle cx="20" cy="15" r="2.5" fill="#fff" opacity="0.9"/>
  <circle cx="28" cy="15" r="2.5" fill="#fff" opacity="0.9"/>
  <circle cx="20" cy="15" r="1.2" fill="#1a1630"/>
  <circle cx="28" cy="15" r="1.2" fill="#1a1630"/>
  <!-- Eyebrow focus -->
  <line x1="17.5" y1="11.5" x2="22.5" y2="12.5" stroke="#5b9ef6" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="25.5" y1="12.5" x2="30.5" y2="11.5" stroke="#5b9ef6" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Neutral mouth -->
  <rect x="20" y="20" width="8" height="1.5" rx="0.75" fill="#5b9ef6" opacity="0.7"/>
  <!-- Neck -->
  <rect x="21" y="24" width="6" height="3" rx="1" fill="#12294a"/>
  <!-- Body -->
  <rect x="12" y="27" width="24" height="16" rx="4" fill="#12294a"/>
  <!-- Pie chart on chest -->
  <circle cx="24" cy="35" r="6" fill="none" stroke="#5b9ef6" stroke-width="1" opacity="0.3"/>
  <path d="M24 35 L24 29 A6 6 0 0 1 30 35 Z" fill="#5b9ef6" opacity="0.7"/>
  <path d="M24 35 L30 35 A6 6 0 0 1 21 40.2 Z" fill="#a78bfa" opacity="0.7"/>
  <path d="M24 35 L21 40.2 A6 6 0 0 1 24 29 Z" fill="#4cba7d" opacity="0.7"/>
  <!-- Arms -->
  <rect x="5" y="27" width="7" height="4" rx="2" fill="#12294a"/>
  <rect x="36" y="27" width="7" height="4" rx="2" fill="#12294a"/>
  <circle cx="5" cy="31" r="2.5" fill="#1a3a5c"/>
  <circle cx="43" cy="31" r="2.5" fill="#1a3a5c"/>
  <!-- Legs -->
  <rect x="16" y="43" width="7" height="4" rx="2" fill="#12294a"/>
  <rect x="25" y="43" width="7" height="4" rx="2" fill="#12294a"/>
</svg>
